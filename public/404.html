<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Sumit Verma</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    @font-face {
      font-family: 'Geist Sans';
      src: url('/fonts/GeistVF.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Geist Mono';
      src: url('/fonts/GeistMonoVF.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Geist Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #FAFAFA;
      background: #0F0F0F;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    .error-code {
      font-family: 'Geist Mono', monospace;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      color: #22D3EE;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .error-subtitle {
      font-family: 'Geist Sans', sans-serif;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 600;
      color: #FAFAFA;
      margin-top: 8px;
    }

    .error-message {
      font-size: 1rem;
      color: #A0A0A0;
      max-width: 420px;
      margin: 16px auto 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      font-family: 'Geist Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      border: none;
      margin-top: 32px;
    }

    .btn-primary {
      background: #22D3EE;
      color: #0F0F0F;
    }

    .btn-primary:hover {
      background: #67E8F9;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(34, 211, 238, 0.25);
    }

    .footer-text {
      position: absolute;
      bottom: 24px;
      font-size: 0.8rem;
      color: #666666;
      font-family: 'Geist Sans', sans-serif;
    }

    @media (prefers-color-scheme: light) {
      body { background: #FAFAFA; color: #1A1A1A; }
      .error-code { color: #0E7490; }
      .error-subtitle { color: #1A1A1A; }
      .error-message { color: #6B7280; }
      .btn-primary { background: #0E7490; color: #FFFFFF; }
      .btn-primary:hover { background: #0891B2; box-shadow: 0 6px 20px rgba(14, 116, 144, 0.25); }
      .footer-text { color: #9CA3AF; }
    }
  </style>
</head>
<body>
  <h1 class="error-code">404</h1>
  <p class="error-subtitle">Page not found</p>
  <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn btn-primary">Back to Home</a>
  <p class="footer-text">Sumit Verma</p>
</body>
</html>
